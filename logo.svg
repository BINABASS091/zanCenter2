<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 120" width="600" height="120">
  <defs>
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- YUN TILES DECOR text with modern styling -->
  <text x="30" y="75" 
        font-family="Arial, sans-serif" 
        font-size="52" 
        font-weight="900" 
        fill="url(#primaryGradient)" 
        letter-spacing="3">
    YUN TILES
  </text>
  
  <text x="30" y="105" 
        font-family="Arial, sans-serif" 
        font-size="32" 
        font-weight="700" 
        fill="url(#accentGradient)" 
        letter-spacing="8">
    DECOR
  </text>
  
  <!-- Decorative rounded cut accent lines -->
  <line x1="30" y1="85" x2="350" y2="85" stroke="url(#primaryGradient)" stroke-width="3" stroke-linecap="round"/>
  <line x1="30" y1="115" x2="200" y2="115" stroke="url(#accentGradient)" stroke-width="2" stroke-linecap="round"/>
</svg>
